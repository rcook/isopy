name: Release

env:
  REF_PREFIX: refs/tags
  BINARY: isopy

permissions:
  contents: write

on:
  push:
    tags:
      - v*.*.*

jobs:
  release:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            target_ext: ""
            archive_type: .tar.gz
            build: macos
            build_os: macos-latest

          #- target: x86_64-apple-darwin
          #  target_ext: ""
          #  archive_type: .tar.gz
          #  build: macos
          #  build_os: macos-latest

          - target: x86_64-pc-windows-msvc
            target_ext: .exe
            archive_type: .zip
            build: windows
            build_os: windows-latest

          - target: x86_64-unknown-linux-musl
            target_ext: ""
            archive_type: .tar.gz
            build: linux
            build_os: ubuntu-latest
    name: Release
    runs-on: ${{ matrix.build_os }}
    steps:
      - name: Check out
        uses: actions/checkout@v3

      - name: Add version to environment
        shell: bash
        run: echo "VERSION=${GITHUB_REF#$REF_PREFIX/}" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        uses: actions-rs/cargo@v1
        with:
          use-cross: true
          command: build
          args: --verbose --release --target ${{ matrix.target }}

      - name: Build archive
        shell: bash
        run: |
          base_name="${{ env.BINARY }}-${{ env.VERSION }}-${{ matrix.target }}"
          archive_name="$base_name${{ matrix.archive_type }}"
          mv "target/${{ matrix.target }}/release/${{ env.BINARY }}${{ matrix.target_ext }}" "$base_name"
          if [ "${{ matrix.archive_type }}" = ".zip" ]; then
            7z a "$archive_name" "$base_name"
          else
            tar -czf "$archive_name" "$base_name"
          fi
          echo "ASSET=$archive_name" >> $GITHUB_ENV

      - name: Publish
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.ASSET }}
