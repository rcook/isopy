name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Lint
        run: cargo clippy --workspace --all-targets --target ${{ matrix.target }} -- -D warnings

      - name: Build
        run: cargo build --target ${{ matrix.target }}

      - name: Test
        run: cargo test --target ${{ matrix.target }}

  # Build each workspace member in isolation so we catch feature-unification
  # leaks (e.g. a crate relying on features activated only because another
  # workspace member enables them). The workspace build above will happily
  # compile such crates; building them alone will not.
  build-per-crate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [isopy, isopy-go, isopy-java, isopy-lib, isopy-python]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: per-crate-${{ matrix.crate }}

      - name: Build
        run: cargo build -p ${{ matrix.crate }}

      - name: Lint
        run: cargo clippy -p ${{ matrix.crate }} --all-targets -- -D warnings
